# ⚠️  DO NOT commit real values — use a secrets manager (Vault, AWS Secrets Manager, K8s Sealed Secrets)
# Fill in base64-encoded values: echo -n "value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: momo-secrets
  namespace: momo
type: Opaque
data:
  DATABASE_URL: <base64_encoded>
  REDIS_PASSWORD: <base64_encoded>
  JWT_SECRET: <base64_encoded>
  MTN_SUBSCRIPTION_KEY: <base64_encoded>
  MTN_API_USER: <base64_encoded>
  MTN_API_KEY: <base64_encoded>
  MTN_CALLBACK_URL: <base64_encoded>
  ADMIN_EMAIL: <base64_encoded>
  ADMIN_PASSWORD: <base64_encoded>
