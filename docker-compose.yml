version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: payment-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-momo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-momo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-momo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: payment-service-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Payment Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service-app
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      NODE_ENV: production
      PORT: 3030
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://109.123.245.58:3030}
      COMMON_X_API_KEY: ${COMMON_X_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-momo}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-momo_db}?schema=public
      POSTGRES_USER: ${POSTGRES_USER:-momo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-momo_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      MTN_BASE_URL: ${MTN_BASE_URL}
      MTN_SUBSCRIPTION_KEY: ${MTN_SUBSCRIPTION_KEY}
      MTN_API_USER: ${MTN_API_USER}
      MTN_API_KEY: ${MTN_API_KEY}
      MTN_ENVIRONMENT: ${MTN_ENVIRONMENT:-production}
      MTN_CALLBACK_URL: ${MTN_CALLBACK_URL:-http://109.123.245.58:3030/mtn-callback}
      RUN_SEED: ${RUN_SEED:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  payment-network:
    driver: bridge
