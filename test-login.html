<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .response {
            margin-top: 20px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .error {
            background-color: #ffe6e6;
            color: #cc0000;
        }
        .success {
            background-color: #e6ffe6;
            color: #006600;
        }
    </style>
</head>
<body>
    <h1>Login Test</h1>
    <div class="form-group">
        <label for="apiUrl">API URL:</label>
        <input type="text" id="apiUrl" value="http://142.93.24.178:3009" placeholder="http://localhost:3009">
    </div>
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" value="admin@example.com" placeholder="admin@example.com">
    </div>
    <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" value="StrongPassword123!" placeholder="StrongPassword123!">
    </div>
    <button onclick="testLogin()">Test Login</button>
    
    <div id="response" class="response" style="display:none;"></div>

    <script>
        async function testLogin() {
            const apiUrl = document.getElementById('apiUrl').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const responseDiv = document.getElementById('response');

            const payload = {
                email: email,
                password: password
            };

            try {
                const response = await fetch(`${apiUrl}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-command': 'ADM_LOGIN_1A2B',
                        'x-api-key': '1223qwe123'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                responseDiv.style.display = 'block';
                responseDiv.className = 'response ' + (response.ok ? 'success' : 'error');
                responseDiv.textContent = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response error';
                responseDiv.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
